name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan:
    name: Plan Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      matrix: ${{ steps.meta.outputs.matrix }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version and target matrix
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [ -z "$VERSION" ]; then
            echo "missing release version" >&2
            exit 1
          fi
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE=true
          else
            PRERELEASE=false
          fi
          MATRIX_JSON='{"include":[
            {"runner":"ubuntu-latest","os":"linux","arch":"amd64"},
            {"runner":"ubuntu-latest","os":"linux","arch":"arm64"},
            {"runner":"ubuntu-latest","os":"darwin","arch":"amd64"},
            {"runner":"ubuntu-latest","os":"darwin","arch":"arm64"},
            {"runner":"ubuntu-latest","os":"windows","arch":"amd64"}
          ]}'
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          printf '%s\n' "$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

  build-local-artifacts:
    name: Build Local Artifacts (${{ matrix.os }}/${{ matrix.arch }})
    needs: plan
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.matrix) }}

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          check-latest: true

      - name: Install packaging dependencies
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Fetch seed compiler
        env:
          FO_SEED_URL: ${{ vars.FO_SEED_URL }}
          FO_SEED_SHA256: ${{ vars.FO_SEED_SHA256 }}
        run: |
          if [ -z "${FO_SEED_URL:-}" ]; then
            echo "Repository variable FO_SEED_URL is required for release builds." >&2
            exit 1
          fi
          mkdir -p build
          SEED_ASSET="$(basename "$FO_SEED_URL")"
          curl -fsSL "$FO_SEED_URL" -o "build/$SEED_ASSET"
          case "$SEED_ASSET" in
            *.tar.gz)
              tar -xzf "build/$SEED_ASSET" -C build
              ;;
            *.zip)
              unzip -q "build/$SEED_ASSET" -d build
              ;;
            *)
              mv "build/$SEED_ASSET" build/fo
              ;;
          esac
          chmod +x build/fo
          if [ -n "${FO_SEED_SHA256:-}" ]; then
            printf '%s  %s\n' "$FO_SEED_SHA256" "build/$SEED_ASSET" | sha256sum -c -
          fi
          ./build/fo version

      - name: Build target artifact
        run: |
          chmod +x scripts/build-release-target.sh
          perl scripts/build-release-target.sh "${{ needs.plan.outputs.version }}" "${{ matrix.os }}" "${{ matrix.arch }}" "dist/release-${{ matrix.os }}-${{ matrix.arch }}"

      - name: Upload target artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-local-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/release-${{ matrix.os }}-${{ matrix.arch }}

  build-global-artifacts:
    name: Build Global Artifacts
    needs:
      - plan
      - build-local-artifacts
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release-global payload
        run: |
          chmod +x scripts/build-release-global.sh
          perl scripts/build-release-global.sh "${{ needs.plan.outputs.version }}" dist/release-global

      - name: Upload global artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-global
          path: dist/release-global

  build-windows-msi:
    name: Build Windows MSI
    needs:
      - plan
      - build-local-artifacts
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows portable asset
        uses: actions/download-artifact@v4
        with:
          name: release-local-windows-amd64
          path: dist/release-windows-amd64

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Install Strawberry Perl
        run: choco install strawberryperl --no-progress -y

      - name: Build MSI
        run: |
          perl scripts/build-windows-msi.sh "${{ needs.plan.outputs.version }}" "dist/release-windows-amd64/raw/fo-windows-amd64.exe" "dist/release-msi/fo-${{ needs.plan.outputs.version }}-windows-amd64.msi"

      - name: Upload MSI asset
        uses: actions/upload-artifact@v4
        with:
          name: release-msi
          path: dist/release-msi/*.msi

  publish:
    name: Publish GitHub Release
    needs:
      - plan
      - build-global-artifacts
      - build-local-artifacts
      - build-windows-msi
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Download local artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-local-*
          path: dist/release
          merge-multiple: true

      - name: Download global artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-global
          path: dist/release

      - name: Download MSI asset
        uses: actions/download-artifact@v4
        with:
          name: release-msi
          path: dist/release

      - name: Refresh release checksums
        run: |
          cd dist/release
          rm -f checksums.txt
          sha256sum *.tar.gz *.zip *.msi install.sh install.ps1 release-manifest.json > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.plan.outputs.version }}
          prerelease: ${{ needs.plan.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/*.msi
            dist/release/checksums.txt
            dist/release/release-manifest.json
            dist/release/install.sh
            dist/release/install.ps1
