name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release tag to build, for example v0.1.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-portables:
    name: Build Portable Assets
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    outputs:
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: meta
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          if [ -z "$VERSION" ]; then
            echo "missing release version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          check-latest: true

      - name: Install Perl zip tooling
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Fetch seed compiler
        env:
          FO_SEED_URL: ${{ vars.FO_SEED_URL }}
          FO_SEED_SHA256: ${{ vars.FO_SEED_SHA256 }}
        run: |
          if [ -z "${FO_SEED_URL:-}" ]; then
            echo "Repository variable FO_SEED_URL is required for release builds." >&2
            exit 1
          fi
          mkdir -p build
          curl -fsSL "$FO_SEED_URL" -o build/fo
          chmod +x build/fo
          if [ -n "${FO_SEED_SHA256:-}" ]; then
            printf '%s  %s\n' "$FO_SEED_SHA256" "build/fo" | sha256sum -c -
          fi
          ./build/fo version

      - name: Build portable release assets
        run: |
          chmod +x scripts/build-release-artifacts.sh
          perl scripts/build-release-artifacts.sh "${{ steps.meta.outputs.version }}" dist/release

      - name: Upload portable assets
        uses: actions/upload-artifact@v4
        with:
          name: release-portables
          path: dist/release

  build-windows-msi:
    name: Build Windows MSI
    runs-on: windows-latest
    needs: build-portables

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download portable assets
        uses: actions/download-artifact@v4
        with:
          name: release-portables
          path: dist/release

      - name: Install WiX Toolset
        run: choco install wixtoolset --no-progress -y

      - name: Install Strawberry Perl
        run: choco install strawberryperl --no-progress -y

      - name: Build MSI
        run: |
          perl scripts/build-windows-msi.sh "${{ needs.build-portables.outputs.version }}" "dist/release/raw/fo-windows-amd64.exe" "dist/release/fo-${{ needs.build-portables.outputs.version }}-windows-amd64.msi"

      - name: Upload MSI asset
        uses: actions/upload-artifact@v4
        with:
          name: release-msi
          path: dist/release/*.msi

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-portables
      - build-windows-msi

    defaults:
      run:
        shell: bash

    steps:
      - name: Download portable assets
        uses: actions/download-artifact@v4
        with:
          name: release-portables
          path: dist/release

      - name: Download MSI asset
        uses: actions/download-artifact@v4
        with:
          name: release-msi
          path: dist/release

      - name: Refresh release checksums
        run: |
          cd dist/release
          rm -f checksums.txt
          sha256sum *.tar.gz *.zip *.msi install.sh install.ps1 > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-portables.outputs.version }}
          files: |
            dist/release/*.tar.gz
            dist/release/*.zip
            dist/release/*.msi
            dist/release/checksums.txt
            dist/release/install.sh
            dist/release/install.ps1
